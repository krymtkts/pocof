name: Test
description: Setup .NET, install PowerShell modules and run all tests.

inputs:
  codecov_token:
    description: "Codecov token"
    required: true
  shell:
    description: "Shell for the job. pwsh or powershell"
    required: true
    default: pwsh

runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: ./global.json
    - name: Install modules from PSGallery
      shell: ${{ inputs.shell }}
      env:
        SHELL: ${{ inputs.shell }}
      run: |
        ./scripts/Initialize-PSResourceRepository.ps1 -Shell $env:SHELL -InstallPslrm
        Restore-PSLResource
    - name: Initialize system locale for PowerShell
      shell: ${{ inputs.shell }}
      if: inputs.shell == 'powershell'
      run: |
        Set-ItemProperty -Path 'HKCU:\Control Panel\International' -Name 'sShortDate' -Value 'yyyy-MM-dd'
        RUNDLL32.EXE USER32.DLL,UpdatePerUserSystemParameters ,1 ,True
    - name: Execute All Tests
      id: run_tests
      shell: ${{ inputs.shell }}
      env:
        VSTEST_CONNECTION_TIMEOUT: 600
      run: |
        Invoke-PSLResource Invoke-Psake '-taskList','TestAll' | Tee-Object -Variable result
        if (-not $result[-1].Success) { exit 1 }
        $reports = (Get-ChildItem ./src/pocof.Test/TestResults/coverage.*.cobertura.xml) -join ','
        "REPORT_PATHS=$reports" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
    - name: Check Unused Security Pins
      shell: ${{ inputs.shell }}
      if: runner.os == 'Linux'
      run: |
        Invoke-PSLResource Invoke-Psake '-taskList','CheckUnusedSecurityPins' | Tee-Object -Variable result
        if (-not $result[-1].Success) { exit 1 }
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v7
      if: runner.os == 'Linux'
      with:
        files: ${{ steps.run_tests.outputs.REPORT_PATHS }}
      env:
        CODECOV_TOKEN: ${{ inputs.codecov_token }}
    # NOTE: separate multiple SARIF uploads to add categories. see https://github.blog/changelog/2024-05-06-code-scanning-will-stop-combining-runs-from-a-single-upload/
    - name: Upload SARIF file for main project
      uses: github/codeql-action/upload-sarif@v4
      if: runner.os == 'Linux'
      with:
        sarif_file: analysis/pocof-report.sarif
        category: Main
    - name: Upload SARIF file for test project
      uses: github/codeql-action/upload-sarif@v4
      if: runner.os == 'Linux'
      with:
        sarif_file: analysis/pocof.Test-report.sarif
        category: Test
    - name: Upload SARIF file for inspector project
      uses: github/codeql-action/upload-sarif@v4
      if: runner.os == 'Linux'
      with:
        sarif_file: analysis/pocof.Inspector-report.sarif
        category: Inspector
    - name: Upload SARIF file for benchmark project
      uses: github/codeql-action/upload-sarif@v4
      if: runner.os == 'Linux'
      with:
        sarif_file: analysis/pocof.Benchmark-report.sarif
        category: Benchmark
